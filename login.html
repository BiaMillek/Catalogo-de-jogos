<!DOCTYPE html>
<html lang="PT-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Catálogo</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="auth-body">
    <main class="auth-main">
        <section class="auth-card">
            <div class="auth-copy">
                <p class="eyebrow">Projeto didatico</p>
                <h1>Login catalogo de jogos</h1>
                <p>
                   Agora a tela já está pronta para uma validação com JavaScript.
                <ul class="auth-list">
                    <li>Validação Front-End dos campos</li>
                    <li>Feedback visual de erro</li>
                    <li>Base pronta para integração com o Flask</li>
                </ul>
            </div>

            <form id="loginForm" class="auth-form" novalidade>
                <label>
                    <span>Usuário</span>
                    <input type="text" id="username" name="username" placeholder="Digite usuário">
                    <small class="fiel-error" id="usernameErro"></small>
                </label>

                <label>
                    <span>Senha</span>
                    <input type="password" id="password" name="password" placeholder="Digite a senha">
                    <small class="field-error" id="passwordError"></small>
                </label>

                <button class="button primary auth-button" type="submit">Entrar</button>
                <p id="loginFeedback" class="form-feedback"></p>
            </form>
        </section>
    </main>
    <script src="login.js"></script>
</body>

</html>
