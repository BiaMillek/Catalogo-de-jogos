<!DOCTYPE html>
<html lang="PT-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 2</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="auth-body">
    <main class="auth-main">
        <section class="auth-main">
            <div class="auth-copy">
                <p class="eyebrow">Projeto didatico</p>
                <h1>Login catalogo de jogos</h1>
                <p>Exemplo simples de autenticação com Flask,sessão e usuário armazenados em arquivo JSON.</p>
                <ul class="auth-list">
                    <li>Validades de usuário e senha no back-and</li>
                    <li>Persistencia dos usuários em <code>data/users.json<code></li>
                <li>Front-end consumindo<code>/api/login<code> com<code> fetch<code></code></li>
                </ul>
            </div>

            <form class="auth-form">
                <label>
                    <span>Usuário</span>
                    <input type="text" placeholder="Digite usuário">
                </label>

                <label>
                    <span>Senha</span>
                    <input type="password" placeholder="Digite a senha">
                </label>

                <button type="submit">Entrar</button>
            </form>
        </section>
    </main>

</body>

</html>
